<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand"><div class="brand-mark"></div><span class="brand-name">zero</span></div>
      <span class="topbar-sep">/</span>
      <button class="project-selector" id="project-selector">
        <span id="project-name">sin proyecto</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>
    <div class="topbar-right">
      <button class="btn-ghost" id="btn-new-project">+ proyecto</button>
      <div class="topbar-meta"><span class="status-dot"></span><span>live</span></div>
    </div>
  </header>

  <div class="app">
    <main class="main" id="main">
      <!-- Dynamic content rendered by JS -->
    </main>

    <aside class="sidebar">
      <div class="sidebar-header"><span class="sidebar-title">chat</span></div>
      <div class="sidebar-messages" id="messages"></div>
      <div class="sidebar-composer">
        <form id="form">
          <input id="input" type="text" placeholder="describí qué vendés…" autocomplete="off" autofocus>
          <button type="submit" id="send-btn" aria-label="enviar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </button>
        </form>
      </div>
    </aside>
  </div>

  <!-- Project dropdown (hidden by default) -->
  <div class="dropdown" id="project-dropdown"></div>

  <script src="/app.js"></script>
</body>
</html>
